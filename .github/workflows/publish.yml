name: Publish to NPM

on:
  push:
    branches:
      - main
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Descargar el código fuente del repositorio
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Instalar y configurar PNPM con la versión 9 moderna
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # Step 3: Instalar y configurar Node.js optimizando la caché de pnpm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # Step 4: Instalar las dependencias de forma flexible y blindada
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # Step 5: Ejecutar la suite completa de pruebas unitarias
      - name: Run Unit Tests
        run: pnpm test

      # Step 6: Compilar los bundles de producción (ESM, CJS, DTS)
      - name: Build Library Bundle
        run: pnpm build

      # Step 7: Publicar de forma segura en NPM usando el token de automatización tradicional
      - name: Publish package to NPM
        run: npm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
